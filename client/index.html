<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3MA CRM</title>
  <link rel="icon" type="image/png" href="assets/logo-mark.png">

  <!-- 3MA brand fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* ── 3MA Brand palette ───────────────────────────────── */
      --color-navy:        #071f40;
      --color-navy-hover:  #0d2d5c;
      --color-navy-deep:   #04152b;
      --color-gold:        #ebab22;
      --color-gold-hover:  #f5bc33;
      --color-gold-soft:   #fdf6e3;
      --color-red:         #c21f32;
      --color-red-hover:   #a91a2a;
      --color-white:       #ffffff;
      --color-light-gray:  #f4f5f7;
      --color-dark-gray:   #1f2937;
      --color-divider:     #dde1e7;
      --color-muted:       #5b6573;

      --color-callout-gold-bg: #fdf6e3;
      --color-callout-navy-bg: #e8edf4;
      --color-callout-red-bg:  #fdecea;

      /* Success status colour — used only for "Won" lead stage */
      --color-success: #1f8a5b;

      /* ── Type ────────────────────────────────────────────── */
      --font-heading: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-body:    'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* ── Shadows ─────────────────────────────────────────── */
      --shadow-sm:   0 1px 3px rgba(7,31,64,0.10);
      --shadow-md:   0 4px 12px rgba(7,31,64,0.12);
      --shadow-lg:   0 8px 28px rgba(7,31,64,0.16);
      --shadow-card: 0 2px 8px rgba(7,31,64,0.10);

      /* ── Radii ───────────────────────────────────────────── */
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 10px;

      /* ── Layout ──────────────────────────────────────────── */
      --bg: var(--color-light-gray);
      --card: var(--color-white);
      --text: var(--color-dark-gray);
      --text-light: var(--color-muted);
      --border: var(--color-divider);

      /* ── Semantic alerts ─────────────────────────────────── */
      --danger:  var(--color-red);
      --warning: var(--color-gold);
      --info:    var(--color-navy);

      /* ── Legacy --green-* tokens — repointed to brand ────── */
      /* Existing inline styles in *.jsx reference these names; we
         repoint them so the codebase picks up the brand palette
         without any per-file color edits. */
      --green-900: var(--color-navy);
      --green-800: var(--color-navy);
      --green-700: var(--color-navy);
      --green-600: var(--color-gold);
      --green-500: var(--color-gold);
      --green-400: var(--color-gold);
      --green-300: var(--color-divider);
      --green-200: var(--color-gold);
      --green-100: var(--color-callout-gold-bg);
      --green-50:  var(--color-callout-gold-bg);
    }

    html, body {
      height: 100%;
    }
    body {
      font-family: var(--font-body);
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 14px;
      line-height: 1.55;
    }

    /* Default form element font (inputs/selects/buttons still need this in Safari) */
    input, select, textarea, button { font-family: inherit; }

    /* Headings default to Montserrat — pages may still set their own size/weight. */
    h1, h2, h3, h4 { font-family: var(--font-heading); color: var(--color-navy); }

    /* Focus ring tuned to the brand */
    :focus-visible { outline: 2px solid var(--color-gold); outline-offset: 2px; }

    /* Light scrollbar that doesn't clash with navy sidebar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(7,31,64,0.18); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(7,31,64,0.32); }

    #root { display: flex; min-height: 100vh; }

    .mobile-topbar {
      display: none;
    }

    @media (max-width: 768px) {
      #root {
        display: block;
        min-height: 100vh;
      }

      .mobile-topbar {
        position: sticky;
        top: 0;
        z-index: 900;
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 58px;
        padding: 10px 14px;
        background: var(--color-navy);
        border-bottom: 2px solid var(--color-gold);
      }

      .mobile-topbar img {
        display: block;
        width: min(190px, calc(100vw - 80px));
        height: auto;
      }

      .mobile-menu-button {
        width: 42px;
        height: 42px;
        border: 1px solid rgba(255,255,255,0.24);
        border-radius: 6px;
        background: transparent;
        display: inline-flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }

      .mobile-menu-button span {
        width: 19px;
        height: 2px;
        background: #fff;
        border-radius: 2px;
      }

      .crm-sidebar {
        display: none !important;
        width: 100% !important;
        min-height: auto !important;
        max-height: calc(100dvh - 58px);
        overflow-y: auto;
        border-right: none !important;
        border-bottom: 1px solid var(--color-navy-deep);
      }

      .crm-sidebar.is-open {
        display: flex !important;
      }

      .crm-sidebar > div:first-child {
        display: none !important;
      }

      .crm-main {
        padding: 14px 12px !important;
        max-height: none !important;
        overflow-y: visible !important;
      }

      .page-header,
      .crm-main > div > div:first-child {
        align-items: flex-start !important;
        gap: 10px !important;
        flex-wrap: wrap !important;
      }

      .page-actions {
        width: 100%;
      }

      input, select, textarea, button {
        min-height: 44px;
      }

      .crm-modal-overlay {
        align-items: flex-start !important;
        padding: 12px !important;
        overflow-y: auto;
      }

      .crm-modal {
        max-width: none !important;
        max-height: calc(100dvh - 24px) !important;
        padding: 20px 16px !important;
        border-radius: 8px !important;
      }

      .crm-modal [style*="grid-template-columns"],
      .crm-main [style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }

      .modal-actions,
      .crm-modal [style*="justify-content: flex-end"] {
        flex-wrap: wrap !important;
      }

      .contacts-panel [style*="align-items: baseline"] {
        align-items: flex-start !important;
        flex-wrap: wrap !important;
      }

      .task-row {
        align-items: flex-start !important;
        flex-wrap: wrap !important;
        gap: 10px !important;
        padding: 14px 0 !important;
      }

      .task-row > div {
        flex-basis: calc(100% - 64px) !important;
      }

      table {
        min-width: 680px;
      }
    }

    @media (max-width: 700px) {
      .crm-main table {
        min-width: 0;
      }

      .crm-main thead {
        display: none;
      }

      .crm-main table,
      .crm-main tbody,
      .crm-main tr,
      .crm-main td {
        display: block;
        width: 100%;
      }

      .crm-main tr {
        border: 1px solid var(--color-divider);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 10px;
        background: #fff;
      }

      .crm-main td {
        border-bottom: none !important;
        padding: 6px 0 !important;
        white-space: normal !important;
        overflow-wrap: anywhere;
      }
    }

    @media (max-width: 480px) {
      .crm-main {
        padding: 12px 10px !important;
      }

      .page-header,
      .crm-main > div > div:first-child {
        display: block !important;
      }

      .page-actions,
      .page-actions > button,
      .crm-main > div > div:first-child button {
        width: 100%;
        justify-content: center;
      }

      .page-actions {
        display: grid !important;
        gap: 8px !important;
      }

      .crm-modal {
        padding: 16px 12px !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
</html>
